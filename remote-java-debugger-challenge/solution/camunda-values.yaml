# Helm 13.4.2 values for Camunda Platform 8.8
global:
  license:
    secret:
      existingSecret: "<CAMUNDA_LICENSE_SECRET_NAME>"
      existingSecretKey: "<CAMUNDA_LICENSE_SECRET_KEY>"

  secrets:
    autoGenerated: false

  ingress:
    enabled: true
    className: "ingress-nginx"
    host: "<YOUR_DOMAIN>"
    tls:
      enabled: true
      secretName: <CAMUNDA_TLS_SECRET_NAME>
    annotations:
      cert-manager.io/cluster-issuer: "<CERT_MANAGER_CLUSTER_ISSUER>"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"

  security:
    allowInsecureImages: false
    authentication:
      method: oidc

  identity:
    auth:
      enabled: true
      type: "MICROSOFT"
      issuer: https://login.microsoftonline.com/<OIDC_TENANT_ID>/v2.0
      issuerBackendUrl: https://login.microsoftonline.com/<OIDC_TENANT_ID>/v2.0
      tokenUrl: https://login.microsoftonline.com/<OIDC_TENANT_ID>/oauth2/v2.0/token
      jwksUrl: https://login.microsoftonline.com/<OIDC_TENANT_ID>/discovery/v2.0/keys
      authUrl: https://login.microsoftonline.com/<OIDC_TENANT_ID>/oauth2/v2.0/authorize
      publicIssuerUrl: https://login.microsoftonline.com/<OIDC_TENANT_ID>/v2.0

      identity:
        clientId: <IDENTITY_CLIENT_ID>
        audience: <IDENTITY_AUDIENCE>
        secret:
          existingSecret: <ENTRA_CREDENTIALS_SECRET_NAME>
          existingSecretKey: <IDENTITY_CLIENT_SECRET_KEY>
        initialClaimName: preferred_username
        initialClaimValue: <INITIAL_ADMIN_USERNAME>

      console:
        clientId: <CONSOLE_CLIENT_ID>
        audience: <CONSOLE_AUDIENCE>
        wellKnown: https://login.microsoftonline.com/<OIDC_TENANT_ID>/v2.0/.well-known/openid-configuration
        redirectUrl: "https://{{ .Values.global.ingress.host }}/console"
        secret:
          existingSecret: <ENTRA_CREDENTIALS_SECRET_NAME>
          existingSecretKey: <CONSOLE_CLIENT_SECRET_KEY>

      webModeler:
        clientId: <WEBMODELER_CLIENT_ID>
        clientApiAudience: <WEBMODELER_CLIENT_API_AUDIENCE>
        publicApiAudience: <WEBMODELER_PUBLIC_API_AUDIENCE>
        redirectUrl: "https://{{ .Values.global.ingress.host }}/modeler"

      optimize:
        clientId: <OPTIMIZE_CLIENT_ID>
        audience: <OPTIMIZE_AUDIENCE>
        secret:
          existingSecret: <ENTRA_CREDENTIALS_SECRET_NAME>
          existingSecretKey: <OPTIMIZE_CLIENT_SECRET_KEY>
        redirectUrl: "https://{{ .Values.global.ingress.host }}/optimize"

identity:
  enabled: true
  contextPath: "/identity"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

identityPostgresql:
  enabled: true
  auth:
    existingSecret: "<CAMUNDA_DB_CREDENTIALS_SECRET_NAME>"
    secretKeys:
      adminPasswordKey: identity-postgresql-admin-password
      userPasswordKey: identity-postgresql-user-password

identityKeycloak:
  enabled: false

console:
  enabled: true
  contextPath: "/console"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

webModeler:
  enabled: true
  contextPath: "/modeler"
  security:
    authentication:
      method: oidc
  restapi:
    mail:
      fromAddress: noreply@example.com
      fromName: Camunda 8 WebModeler

webModelerPostgresql:
  enabled: true
  auth:
    existingSecret: "<CAMUNDA_DB_CREDENTIALS_SECRET_NAME>"
    secretKeys:
      adminPasswordKey: "web-modeler-postgresql-admin-password"
      userPasswordKey: "web-modeler-postgresql-user-password"

connectors:
  enabled: false
  contextPath: "/connectors"
  security:
    authentication:
      method: oidc
      oidc:
        clientId: <CONNECTORS_CLIENT_ID>
        tokenScope: <CONNECTORS_TOKEN_SCOPE>
        secret:
          existingSecret: <ENTRA_CREDENTIALS_SECRET_NAME>
          existingSecretKey: <CONNECTORS_CLIENT_SECRET_KEY>
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

orchestration:
  contextPath: "/orchestration"
  clusterSize: "1"
  partitionCount: "1"
  replicationFactor: "1"

  javaOpts: >-
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/usr/local/camunda/data
    -XX:ErrorFile=/usr/local/camunda/data/camunda_error%p.log
    -XX:+ExitOnOutOfMemoryError
    -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

  service:
    extraPorts:
      - name: debug
        protocol: TCP
        port: 5005
        targetPort: 5005

  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  ingress:
    grpc:
      enabled: true
      className: "ingress-nginx"
      host: "<YOUR_GRPC_DOMAIN>"
      tls:
        enabled: true
        secretName: <CAMUNDA_GRPC_TLS_SECRET_NAME>
      annotations:
        cert-manager.io/cluster-issuer: "<CERT_MANAGER_CLUSTER_ISSUER>"
        nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  security:
    authentication:
      method: oidc
      unprotectedApi: false
      oidc:
        clientId: <ORCHESTRATION_CLIENT_ID>
        audience: <ORCHESTRATION_AUDIENCE>
        redirectUrl: "https://{{ .Values.global.ingress.host }}/orchestration"

        secret:
          existingSecret: <ORCHESTRATION_CREDENTIALS_SECRET_NAME>
          existingSecretKey: <ORCHESTRATION_CLIENT_SECRET_KEY>

        usernameClaim: preferred_username
        clientIdClaim: azp
        preferUsernameClaim: true
        scope:
          - openid
          - profile
          - offline_access
          - "<ORCHESTRATION_SCOPE>"

    authorizations:
      enabled: true
    initialization:
      defaultRoles:
        admin:
          users:
            - "<ADMIN_USER_EMAIL_OR_USERNAME>"
        connectors:
          clients:
            - "<CONNECTORS_CLIENT_ID>"

optimize:
  enabled: false
  contextPath: "/optimize"
  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

elasticsearch:
  master:
    replicaCount: 1
    resources:
      requests:
        cpu: 400m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
