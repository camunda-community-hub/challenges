receivers:
  prometheus:
    config:
      global:
        scrape_interval: 30s
        scrape_timeout: 5s
        scrape_protocols: [OpenMetricsText1.0.0, PrometheusText0.0.4]
      scrape_configs:
        - job_name: "camunda_lhr"
          scheme: https
          metrics_path: "/3a20587e-9917-4be0-9fe6-87f90224c9ea"
          static_configs:
            - targets:
                - "lhr-1.monitoring.camunda.io"
          basic_auth:
            username: "${CAMUNDA_METRICS_USERNAME}"
            password: "${CAMUNDA_METRICS_PASSWORD}"

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

exporters:
  otlp_http:
    endpoint: "http://dd-agent:4318"
    compression: gzip
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch]
      exporters: [otlp_http]