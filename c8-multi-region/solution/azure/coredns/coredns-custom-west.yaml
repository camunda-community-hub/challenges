# coredns-custom-west.yaml# Deployed on the WEST cluster (joey_k8s_westus2)# Forwards blue-west and green-east domain queries to the EAST proxy LB.# Replace 172.212.39.11 with the EXTERNAL-IP of coredns-proxy-lb on the east cluster.## kubectl config use-context joey_k8s_westus2# kubectl apply -f coredns-custom-west.yaml# kubectl rollout restart deployment coredns -n kube-systemapiVersion: v1kind: ConfigMapmetadata:  name: coredns-custom  namespace: kube-systemdata:  blue-west.server: |    blue-west.svc.cluster.local:53 {        errors        cache 30        forward . 172.212.39.11:53    }  blue-west-failover.server: |    blue-west-failover.svc.cluster.local:53 {        errors        cache 30        forward . 172.212.39.11:53    }  green-east.server: |    green-east.svc.cluster.local:53 {        errors        cache 30        forward . 172.212.39.11:53    }  green-east-failover.server: |    green-east-failover.svc.cluster.local:53 {        errors        cache 30        forward . 172.212.39.11:53    }