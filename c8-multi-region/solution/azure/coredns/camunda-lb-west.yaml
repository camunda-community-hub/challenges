# camunda-lb-west.yaml# Deployed on the WEST cluster (joey_k8s_westus2) in blue-west namespace.# Uses static public IPs that never change between deployments.# IMPORTANT: Always use kubectl apply, never delete+recreate.## kubectl config use-context joey_k8s_westus2# kubectl apply -f camunda-lb-west.yaml---apiVersion: v1kind: Servicemetadata:  name: camunda-zeebe-lb  namespace: blue-west  annotations:    service.beta.kubernetes.io/azure-load-balancer-resource-group: mc_joey_k8s_westus2-rg_joey_k8s_westus2_westus2spec:  type: LoadBalancer  loadBalancerIP: 4.154.234.246  publishNotReadyAddresses: true  selector:    app: camunda-platform    app.kubernetes.io/component: zeebe-broker    app.kubernetes.io/instance: camunda    app.kubernetes.io/managed-by: Helm    app.kubernetes.io/name: camunda-platform  ports:    - name: cluster      port: 26502      targetPort: 26502      protocol: TCP    - name: command      port: 26501      targetPort: 26501      protocol: TCP---apiVersion: v1kind: Servicemetadata:  name: camunda-elasticsearch-lb  namespace: blue-west  annotations:    service.beta.kubernetes.io/azure-load-balancer-resource-group: mc_joey_k8s_westus2-rg_joey_k8s_westus2_westus2spec:  type: LoadBalancer  loadBalancerIP: 4.155.211.127  selector:    app.kubernetes.io/name: elasticsearch    app.kubernetes.io/instance: camunda    app.kubernetes.io/component: master  ports:    - name: http      port: 9200      targetPort: 9200      protocol: TCP