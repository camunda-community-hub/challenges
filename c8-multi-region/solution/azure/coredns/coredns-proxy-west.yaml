# coredns-proxy-west.yaml# Deployed on the WEST cluster (joey_k8s_westus2 / blue-west namespace: kube-system)# This is the AKS equivalent of dns-lb.yaml from GKE.# It deploys a CoreDNS proxy that resolves blue-west.svc.cluster.local# names for external callers (i.e. the east cluster).# After applying, get the EXTERNAL-IP of coredns-proxy-lb and use it# as the forwarding target in coredns-custom-east.yaml.## kubectl config use-context joey_k8s_westus2# kubectl apply -f coredns-proxy-west.yaml# kubectl get svc coredns-proxy-lb -n kube-system -w---apiVersion: v1kind: ConfigMapmetadata:  name: coredns-proxy  namespace: kube-systemdata:  Corefile: |    blue-west.svc.cluster.local:5353 {        errors        kubernetes cluster.local {          namespaces blue-west blue-west-failover          pods insecure          fallthrough        }        forward . 10.0.0.10        cache 30        log    }    blue-west-failover.svc.cluster.local:5353 {        errors        kubernetes cluster.local {          namespaces blue-west blue-west-failover          pods insecure          fallthrough        }        forward . 10.0.0.10        cache 30        log    }---apiVersion: apps/v1kind: Deploymentmetadata:  name: coredns-proxy  namespace: kube-system  labels:    app: coredns-proxyspec:  replicas: 2  selector:    matchLabels:      app: coredns-proxy  template:    metadata:      labels:        app: coredns-proxy    spec:      serviceAccountName: coredns      containers:        - name: coredns          image: registry.k8s.io/coredns/coredns:v1.11.1          args: ["-conf", "/etc/coredns/Corefile"]          ports:            - containerPort: 5353              protocol: UDP              name: dns-udp            - containerPort: 5353              protocol: TCP              name: dns-tcp          volumeMounts:            - name: config              mountPath: /etc/coredns      volumes:        - name: config          configMap:            name: coredns-proxy---apiVersion: v1kind: Servicemetadata:  name: coredns-proxy-lb  namespace: kube-system  labels:    app: coredns-proxyspec:  type: LoadBalancer  ports:    - name: dns-udp      port: 53      targetPort: 5353      protocol: UDP  selector:    app: coredns-proxy