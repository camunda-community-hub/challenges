# coredns-custom-east.yaml# Deployed on the EAST cluster (joey_k8s)# Forwards green-east and blue-west domain queries to the WEST proxy LB.# Replace 172.193.220.146 with the EXTERNAL-IP of coredns-proxy-lb on the west cluster.## kubectl config use-context joey_k8s# kubectl apply -f coredns-custom-east.yaml# kubectl rollout restart deployment coredns -n kube-systemapiVersion: v1kind: ConfigMapmetadata:  name: coredns-custom  namespace: kube-systemdata:  green-east.server: |    green-east.svc.cluster.local:53 {        errors        cache 30        forward . 172.193.220.146:53    }  green-east-failover.server: |    green-east-failover.svc.cluster.local:53 {        errors        cache 30        forward . 172.193.220.146:53    }  blue-west.server: |    blue-west.svc.cluster.local:53 {        errors        cache 30        forward . 172.193.220.146:53    }  blue-west-failover.server: |    blue-west-failover.svc.cluster.local:53 {        errors        cache 30        forward . 172.193.220.146:53    }